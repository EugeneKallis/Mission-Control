kind: pipeline
type: docker
name: dev-deploy

labels:
  type: builder

steps:
  - name: generate-tag
    image: alpine:latest
    when:
      branch: develop
      event: [ push, manual ]
    commands:
      - export SHORT_SHA=$(printf '%s' "$CI_COMMIT_SHA" | cut -c1-8)
      - echo "dev-$(date +'%m.%d.%H-%M').${SHORT_SHA}" > .tags

  - name: build-backend
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/mission-control-backend
      dockerfile: backend/Dockerfile
      context: backend
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  - name: build-frontend
    image: plugins/docker
    when:
      branch: develop
      event: [ push, manual ]
    settings:
      repo: eugenekallis/mission-control-frontend
      dockerfile: frontend/Dockerfile
      context: frontend
      daemon_off: true
      tags_file: .tags
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
    depends_on: [generate-tag]

  - name: deploy-dev
    image: alpine:latest
    when:
      branch: develop
      event: [ push, manual ]
    commands:
      - apk add --no-cache git yq openssh-client
      - mkdir -p ~/.ssh
      - echo "$GIT_SSH_KEY" > ~/.ssh/id_rsa
      - chmod 600 ~/.ssh/id_rsa
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git clone --depth 1 git@github.com:EugeneKallis/kubernetes-cluster.git infra
      - cd infra
      - 'export TAG=$(cat ../.tags)'
      - 'yq -i ".global.image.tag = \"$TAG\"" charts/mission-control/values-dev.yaml'
      - git add charts/mission-control/values-dev.yaml
      - git config user.name "Woodpecker CI"
      - git config user.email "woodpecker@cluster.lan"
      - |
        if git diff --cached --quiet; then
          echo "values-dev.yaml already points at $TAG — skipping commit"
          exit 0
        fi
      - 'git commit -m "chore: deploy dev $TAG"'
      - git pull --rebase origin main
      - git push origin main
    environment:
      GIT_SSH_KEY:
        from_secret: git_ssh_key
    depends_on:
      - build-backend
      - build-frontend
